<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>21K Agosto 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/plan.css">
</head>
<body>

<nav class="topnav">
  <div class="nav-brand">
    <span class="brand-num">21K</span>
    <span class="brand-sep">·</span>
    <span class="brand-sub">AGO 2026</span>
  </div>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('plan', this)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Plan
    </button>
    <button class="tab-btn" onclick="switchTab('strava', this)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Strava
    </button>
    <button class="tab-btn" data-tab="coach" onclick="switchTab('coach')">Coach</button>
  </div>
  <button class="settings-btn" onclick="toggleSettings()" title="Ajustar ritmos">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
    Ritmos
  </button>


  
</nav>

<!-- PACE SETTINGS PANEL -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-inner">
    <div class="settings-header">
      <span>Ajustar zonas de ritmo</span>
      <button onclick="toggleSettings()" class="close-btn">✕</button>
    </div>
    <div class="settings-body">
      <p class="settings-hint">Modificá los ritmos base. El plan se actualizará automáticamente.</p>
      <div class="pace-inputs">
        <div class="pace-row">
          <label>VDOT</label>
          <input type="number" id="vdot" value="42" min="30" max="65" step="1" onchange="recalcPaces()">
        </div>
        <div class="pace-row">
          <label class="z-easy">Fácil (E)</label>
          <input type="text" id="paceEasy" value="6:35" placeholder="6:35">
          <span class="pace-unit">/km</span>
        </div>
        <div class="pace-row">
          <label class="z-mod">Moderado (M)</label>
          <input type="text" id="paceMod" value="6:00" placeholder="6:00">
          <span class="pace-unit">/km</span>
        </div>
        <div class="pace-row">
          <label class="z-tempo">Tempo (T)</label>
          <input type="text" id="paceTempo" value="5:15" placeholder="5:15">
          <span class="pace-unit">/km</span>
        </div>
        <div class="pace-row">
          <label class="z-interval">Intervalos (I)</label>
          <input type="text" id="paceInterval" value="4:50" placeholder="4:50">
          <span class="pace-unit">/km</span>
        </div>
        <div class="pace-row">
          <label class="z-race">Pace 21K</label>
          <input type="text" id="paceRace" value="5:40" placeholder="5:40">
          <span class="pace-unit">/km</span>
        </div>
      </div>
      <div class="settings-footer">
        <button class="btn-secondary" onclick="resetPaces()">Restablecer</button>
        <button class="btn-primary" onclick="applyPaces()">Aplicar al plan</button>
      </div>
    </div>
  </div>
</div>
<div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()"></div>

<!-- TABS -->
<div id="tab-plan" class="tab-content active">
  <div id="planApp"></div>
</div>

<div id="tab-strava" class="tab-content">
  <div id="stravaApp"></div>
</div>

  <div id="tab-coach" class="tab-content">
  <div id="coachApp"></div>
</div>

<script src="js/paces.js"></script>
<script src="js/plan.js"></script>
<script src="js/strava.js"></script>
<script src="js/app.js"></script>
  <script src="js/coach.js"></script>
</body>
</html>
