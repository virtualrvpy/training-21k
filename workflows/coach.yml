name: Coach Analysis

on:
  repository_dispatch:
    types: [coach-analyze]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STRAVA_ACCESS_TOKEN: ${{ github.event.client_payload.access_token }}
          STRAVA_ACTIVITY_ID: ${{ github.event.client_payload.activity_id }}
          PLAN_CONTEXT: ${{ toJson(github.event.client_payload.plan_context) }}
        run: node scripts/analyze.js

      - name: Commit result
        run: |
          git config user.name "Coach Bot"
          git config user.email "coach@training-21k"
          git add data/coach-latest.json
          git diff --staged --quiet || git commit -m "coach: análisis $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
